name: 构建迷雾通5 (Ubuntu 22.04)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

env:
  DEBIAN_FRONTEND: noninteractive
  CI: true
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 2

jobs:
  build_geph5:
    name: 为 Ubuntu 22.04 构建迷雾通5
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 检出当前仓库代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 缓存 Cargo 注册表和 git 仓库
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 缓存 pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store
          restore-keys: |
            ${{ runner.os }}-pnpm-store

      - name: 构建 Builder Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.builder
          tags: geph5-builder:22.04
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 在 Docker 中执行构建
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -v ~/.cargo:/root/.cargo \
            -v ~/.local/share/pnpm:/root/.local/share/pnpm \
            -e PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:/usr/lib/pkgconfig" \
            -e PKG_CONFIG_ALLOW_SYSTEM_CFLAGS=1 \
            geph5-builder:22.04 \
            bash -c '
              set -e
              cd /src

              echo "=== 克隆并构建 geph5-client ==="
              if [ ! -d geph5 ]; then
                git clone --recurse-submodules https://github.com/geph-official/geph5.git
              else
                cd geph5 && git pull && git submodule update --init --recursive && cd ..
              fi
              cd geph5 && cargo build --release --bin geph5-client && cd ..

              echo "=== 克隆并构建 gephgui-wry ==="
              if [ ! -d gephgui-wry ]; then
                git clone --recurse-submodules https://github.com/geph-official/gephgui-wry.git
              else
                cd gephgui-wry && git pull && git submodule update --init --recursive && cd ..
              fi
              cd gephgui-wry/gephgui
              pnpm install --frozen-lockfile || pnpm install
              pnpm build && cd /src

              cd /src/gephgui-wry && cargo build --release --bin gephgui-wry

              echo "=== 准备发布文件 ==="
              mkdir -p /src/build
              cp /src/geph5/target/release/geph5-client /src/build/
              cp /src/gephgui-wry/target/release/gephgui-wry /src/build/
              echo "function FindProxyForURL(url, host) { return \"SOCKS5 127.0.0.1:9909; DIRECT\"; }" > /src/build/pac

              if [[ "${{ github.ref }}" == refs/tags/* ]]; then
                echo "${{ github.ref_name }}" > /src/build/VERSION
              else
                echo "dev-$(git -C geph5 rev-parse --short HEAD 2>/dev/null || echo unknown)" > /src/build/VERSION
              fi

              cd /src/build
              tar -Jcvf /src/build_geph5_ubuntu22.04.tar.xz .
            '

      - name: 移动到 release 目录
        run: |
          mkdir -p release
          mv build_geph5_ubuntu22.04.tar.xz release/ 2>/dev/null || true

      - name: 发布到 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: release/*
          tag: ${{ github.ref_name }}
          overwrite: true
          file_glob: true
