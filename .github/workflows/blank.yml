name: 构建迷雾通5

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DEBIAN_FRONTEND: noninteractive
  CI: true
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_geph5:
    name: 构建 geph5 (Ubuntu ${{ matrix.ubuntu_version }})
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        ubuntu_version: ["22.04", "24.04"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-store
          restore-keys: |
            ${{ runner.os }}-pnpm-store

      - name: Get geph5 version
        id: version
        run: |
          VERSION=$(curl -sL "https://raw.githubusercontent.com/geph-official/geph5/master/Cargo.toml" | grep "^version" | head -1 | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.builder
          build-args: |
            UBUNTU_VERSION=${{ matrix.ubuntu_version }}
          tags: geph5-builder:${{ matrix.ubuntu_version }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            -v ~/.cargo:/root/.cargo \
            -v ~/.local/share/pnpm:/root/.local/share/pnpm \
            -e UBUNTU_VERSION=${{ matrix.ubuntu_version }} \
            -e GEPH5_VERSION=${{ steps.version.outputs.version }} \
            geph5-builder:${{ matrix.ubuntu_version }} \
            bash -c '
              set -e
              cd /src

              echo "=== Clone geph5 ==="
              if [ ! -d geph5 ]; then
                git clone --recurse-submodules https://github.com/geph-official/geph5.git
              else
                cd geph5 && git pull && git submodule update --init --recursive && cd ..
              fi

              echo "=== Build geph5-client ==="
              cd geph5 && cargo build --release --bin geph5-client && cd ..

              echo "=== Build gephgui-wry ==="
              if [ ! -d gephgui-wry ]; then
                git clone --recurse-submodules https://github.com/geph-official/gephgui-wry.git
              else
                cd gephgui-wry && git pull && git submodule update --init --recursive && cd ..
              fi
              cd gephgui-wry/gephgui
              pnpm install --frozen-lockfile || pnpm install
              pnpm build && cd /src
              cd /src/gephgui-wry && cargo build --release --bin gephgui-wry

              echo "=== Package ==="
              echo "Version: $GEPH5_VERSION"
              OS_LABEL="ubu${UBUNTU_VERSION/./}"

              mkdir -p /src/build
              cp /src/geph5/target/release/geph5-client /src/build/
              cp /src/gephgui-wry/target/release/gephgui-wry /src/build/
              echo "function FindProxyForURL(url, host) { return \"SOCKS5 127.0.0.1:9909; DIRECT\"; }" > /src/build/pac
              echo "v$GEPH5_VERSION" > /src/build/VERSION

              cd /src/build
              tar -Jcvf "/src/build_v${GEPH5_VERSION}_${OS_LABEL}.tar.xz" .

              echo "$OS_LABEL" > /src/.os_label
            '

      - name: Read os label
        id: info
        run: |
          echo "oslabel=$(cat .os_label)" >> $GITHUB_OUTPUT

      - name: Prepare release directory
        run: |
          mkdir -p release
          mv build_*.tar.xz release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: geph5-${{ steps.info.outputs.oslabel }}
          path: release/*

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="geph5_v${{ steps.version.outputs.version }}"
          gh release view "$TAG" --repo ${{ github.repository }} &>/dev/null || \
            gh release create "$TAG" \
              --repo ${{ github.repository }} \
              --title "Geph5 v${{ steps.version.outputs.version }}" \
              --notes "自动构建于 $(date -u '+%Y-%m-%d %H:%M UTC')"
          gh release upload "$TAG" release/* \
            --repo ${{ github.repository }} --clobber
