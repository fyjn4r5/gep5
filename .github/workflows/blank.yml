name: 构建迷雾通5 (Ubuntu 22.04 & 24.04)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

env:
  DEBIAN_FRONTEND: noninteractive
  CI: true

jobs:
  build_geph5:
    name: 为 Ubuntu ${{ matrix.os_version }} 构建迷雾通5
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        include:
          - os_version: "22.04"
            docker_target: builder22
            docker_tag: geph5-builder:22.04
          - os_version: "24.04"
            docker_target: builder24
            docker_tag: geph5-builder:24.04

    steps:
      - name: 检出当前仓库代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建 Builder Docker 镜像 (${{ matrix.os_version }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.builder
          target: ${{ matrix.docker_target }}
          tags: ${{ matrix.docker_tag }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 在 Docker 中执行构建 (${{ matrix.os_version }})
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            ${{ matrix.docker_tag }} \
            bash -c '
              set -e
              cd /src

              echo "=== 克隆并构建 geph5-client ==="
              git clone --recurse-submodules https://github.com/geph-official/geph5.git
              cd geph5 && cargo build --release --bin geph5-client && cd ..

              echo "=== 克隆并构建 gephgui-wry ==="
              git clone --recurse-submodules https://github.com/geph-official/gephgui-wry.git
              cd gephgui-wry/gephgui 
              pnpm install --frozen-lockfile || pnpm install
              pnpm build && cd ..

              cd gephgui-wry && cargo build --release --bin gephgui-wry && cd ..

              echo "=== 准备发布文件 ==="
              mkdir -p /src/build
              cp geph5/target/release/geph5-client /src/build/
              cp gephgui-wry/target/release/gephgui-wry /src/build/
              echo "function FindProxyForURL(url, host) { return \"SOCKS5 127.0.0.1:9909; DIRECT\"; }" > /src/build/pac

              if [[ "${{ github.ref }}" == refs/tags/* ]]; then
                echo "${{ github.ref_name }}" > /src/build/VERSION
              else
                echo "dev-$(git -C geph5 rev-parse --short HEAD 2>/dev/null || echo unknown)" > /src/build/VERSION
              fi

              cd /src/build
              tar -Jcvf /src/build_geph5_ubuntu${{ matrix.os_version }}.tar.xz .
            '

      - name: 移动到 release 目录
        run: |
          mkdir -p release
          mv build_geph5_ubuntu*.tar.xz release/ 2>/dev/null || true

      - name: 发布到 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: release/*
          tag: ${{ github.ref_name }}
          overwrite: true
          file_glob: true
